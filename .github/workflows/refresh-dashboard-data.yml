name: Refresh dashboard data

on:
  # Hourly refresh (UTC). GitHub may delay scheduled runs by a few minutes.
  schedule:
    - cron: "0 * * * *"

  # Manual refresh from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LiSPER-Dashboard
        uses: actions/checkout@v4

      - name: Checkout LiSPER data source
        uses: actions/checkout@v4
        with:
          repository: jackyissocute/LiSPER
          path: LiSPER
          token: ${{ secrets.LISPER_ACCESS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract metrics
        run: python3 scripts/extract_dashboard_data.py --lisper-root LiSPER --out data/dashboard.json

      - name: Commit updated dashboard.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json data/dashboard.bundle.js
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi
          git commit -m "chore: refresh dashboard data [skip ci]"
          git push
